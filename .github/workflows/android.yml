name: Apk

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        run: |
         cd android
         chmod +x gradlew
         ./gradlew assembleDebug
         
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:      
          name: motionfocus
          path: android/app/build/outputs/apk/debug/app-debug.apk
